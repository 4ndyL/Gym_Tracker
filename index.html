<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<title>Gym Tracker</title>
<style>
/* ── System fonts only — no external requests ── */
:root {
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;
  --dark:#0f1923; --card:#162030; --card2:#1a2a3d;
  --green:#2ecc71; --green-dim:#1a7a44;
  --teal:#1abc9c; --gold:#f0a500;
  --text:#e8f0f8; --muted:#7a9bbf; --border:#1e3048;
  --red:#e05555; --purple:#a78bfa; --blue:#4a9eca;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--dark);color:var(--text);font-family:var(--sans);
  min-height:100vh;padding-bottom:max(40px,env(safe-area-inset-bottom));}

/* ── HEADER ── */
#header{background:linear-gradient(160deg,#0a1520,#162030);
  padding:18px 16px 14px;padding-top:max(18px,env(safe-area-inset-top));
  position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.hdr-title{font-size:21px;font-weight:700;letter-spacing:-0.01em;}
.hdr-sub{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:3px;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.counter-wrap{text-align:right;}
.counter-num{font-size:23px;font-weight:700;color:var(--gold);font-family:var(--mono);line-height:1;transition:color .3s;}
.counter-num.complete{color:var(--green);}
.counter-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);}
